<style>
:root{
  --navy:#0f131d;
  --navy-2:#1a1f2e;
  --navy-3:#252b3d;
  --line:rgba(232,227,216,0.08);
  --line-strong:rgba(232,227,216,0.18);
  --cream:#e8e3d8;
  --cream-dim:rgba(232,227,216,0.62);
  --cream-faint:rgba(232,227,216,0.4);
  --gold:#d4a574;
  --gold-dim:rgba(212,165,116,0.85);
  --rose:#c98a8a;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--navy);color:var(--cream);font-family:var(--sans);font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{display:flex;flex-direction:column;min-height:100vh}
a{color:var(--gold);text-decoration:none;border-bottom:1px solid transparent;transition:border-color .15s ease}
a:hover{border-bottom-color:var(--gold)}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-dim)}
.serif{font-family:var(--serif)}
.mono{font-family:var(--mono)}

header.site{border-bottom:1px solid var(--line);padding:1.4rem 0;position:sticky;top:0;background:rgba(15,19,29,0.92);backdrop-filter:saturate(140%) blur(8px);z-index:50}
header.site .wrap{max-width:1280px;margin:0 auto;padding:0 1.8rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.brand{font-family:var(--serif);font-size:1.45rem;font-weight:500;color:var(--cream);letter-spacing:-.01em;border-bottom:none}
.brand .accent{color:var(--gold);font-style:italic}
nav.primary{display:flex;gap:1.6rem;align-items:center;flex-wrap:wrap}
nav.primary a{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-dim);border-bottom:none;padding:.4rem .1rem;transition:color .15s ease}
nav.primary a:hover{color:var(--cream)}
nav.primary a.active{color:var(--gold);border-bottom:1px solid var(--gold)}

main{flex:1;width:100%;display:flex;flex-direction:column}
.container{max-width:1280px;width:100%;margin:0 auto;padding:0 1.8rem}

.hero{position:relative;min-height:78vh;display:flex;align-items:flex-end;overflow:hidden;background:var(--navy)}
.hero .bgimg{position:absolute;inset:0;background-position:center 35%;background-size:cover;background-repeat:no-repeat;z-index:0}
.hero .overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,19,29,0.35) 0%,rgba(15,19,29,0.30) 40%,rgba(15,19,29,0.78) 78%,rgba(15,19,29,1) 100%);z-index:1}
.hero .content{position:relative;z-index:2;width:100%;padding:4rem 0 3.5rem}
.hero .content .inner{max-width:1280px;margin:0 auto;padding:0 1.8rem}
.hero h1{font-family:var(--serif);font-weight:400;font-size:clamp(2.6rem,5.8vw,5rem);line-height:1.02;letter-spacing:-.025em;margin:1rem 0 1.4rem;max-width:16ch;color:var(--cream)}
.hero h1 em{color:var(--gold);font-style:italic;font-weight:400}
.hero .sub{max-width:60ch;color:var(--cream-dim);font-size:1.08rem;line-height:1.55}
.hero.no-image .bgimg{display:none}
.hero.no-image{min-height:auto;padding:2rem 0 0}
.hero.no-image .overlay{display:none}

.stat-strip{background:var(--navy);border-bottom:1px solid var(--line);padding:2.5rem 0}
.stat-strip .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1px;background:var(--line)}
.stat-strip .stat{background:var(--navy);padding:1.6rem 1.5rem;display:flex;flex-direction:column;gap:.55rem;min-height:120px}
.stat-strip .stat .label{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-faint)}
.stat-strip .stat .value{font-family:var(--serif);font-size:2.6rem;font-weight:400;color:var(--cream);line-height:1;font-style:italic;letter-spacing:-.015em}
.stat-strip .stat .meta{font-size:.82rem;color:var(--cream-dim);margin-top:auto}

section.page{padding:4.5rem 0 1rem}
section.page + section.page{padding-top:2rem}
.section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:1.5rem;margin-bottom:1.8rem;flex-wrap:wrap}
.section-head h2{font-family:var(--serif);font-size:clamp(1.8rem,3.2vw,2.6rem);font-weight:400;letter-spacing:-.015em;line-height:1.05}
.section-head h2 em{color:var(--gold);font-style:italic}
.section-head .lead{color:var(--cream-dim);max-width:50ch;margin-top:.6rem;font-size:.98rem}

.search-bar{display:flex;align-items:center;gap:.85rem;background:var(--navy-2);border:1px solid var(--line-strong);border-radius:6px;padding:.65rem .9rem;flex:1;min-width:240px;max-width:380px}
.search-bar input{background:transparent;border:none;color:var(--cream);font-family:var(--sans);font-size:.95rem;flex:1;outline:none}
.search-bar input::placeholder{color:var(--cream-faint)}
.search-bar .icon{color:var(--cream-faint);font-size:.95rem}
.search-bar .clear{background:none;border:none;color:var(--cream-faint);cursor:pointer;font-size:1.1rem;line-height:1;padding:0 .2rem;display:none}
.search-bar.has-value .clear{display:block}
.result-count{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint)}

.map-wrap{position:relative;height:560px;background:var(--navy-2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
.map-wrap .leaflet-container{height:100%;width:100%;background:var(--navy-2);font-family:var(--sans)}
.map-wrap .leaflet-popup-content-wrapper{background:var(--navy);color:var(--cream);border-radius:4px;border:1px solid var(--line-strong);box-shadow:0 6px 24px rgba(0,0,0,0.4)}
.map-wrap .leaflet-popup-tip{background:var(--navy);border:1px solid var(--line-strong)}
.map-wrap .leaflet-popup-content{margin:0;padding:0;min-width:200px}
.map-wrap .leaflet-popup-close-button{color:var(--cream-faint)}
.map-wrap .leaflet-popup-close-button:hover{color:var(--gold)}
.map-pop{padding:.9rem 1rem .85rem}
.map-pop .name{font-family:var(--serif);font-size:1.15rem;font-weight:400;color:var(--cream);margin-bottom:.25rem;line-height:1.2}
.map-pop .meta{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint);margin-bottom:.7rem}
.map-pop .cta{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);border-bottom:none;display:inline-block}
.map-pop .cta:hover{border-bottom:1px solid var(--gold)}
@media (max-width:680px){.map-wrap{height:440px}}

table.menu{width:100%;border-collapse:collapse;font-size:.95rem;background:var(--navy-2);border:1px solid var(--line);border-radius:6px;overflow:hidden}
table.menu thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint);text-align:left;padding:.95rem 1rem;border-bottom:1px solid var(--line-strong);font-weight:500;cursor:pointer;user-select:none;white-space:nowrap;transition:color .15s ease}
table.menu thead th:hover{color:var(--cream)}
table.menu thead th.num{text-align:right}
table.menu thead th.sortable::after{content:"";display:inline-block;margin-left:.4rem;opacity:.4;font-size:.7em;vertical-align:1px}
table.menu thead th.sort-asc::after{content:"↑";opacity:1;color:var(--gold)}
table.menu thead th.sort-desc::after{content:"↓";opacity:1;color:var(--gold)}
table.menu tbody td{padding:.95rem 1rem;border-bottom:1px solid var(--line);color:var(--cream);transition:background .15s ease}
table.menu tbody tr{cursor:pointer;transition:background .12s ease}
table.menu tbody tr:hover td{background:var(--navy-3)}
table.menu tbody tr:last-child td{border-bottom:none}
table.menu td.num{text-align:right;font-variant-numeric:tabular-nums}
table.menu td.muted{color:var(--cream-dim)}
table.menu td.name{font-family:var(--serif);font-size:1.05rem;font-weight:400}
table.menu .empty-row td{text-align:center;padding:2rem 1rem;color:var(--cream-dim);cursor:default}
table.menu .empty-row:hover td{background:transparent}
@media (max-width:780px){table.menu th.hide-md,table.menu td.hide-md{display:none}}
@media (max-width:560px){table.menu th.hide-sm,table.menu td.hide-sm{display:none}}

.intel-teaser{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;padding:2.5rem 2.2rem;display:grid;grid-template-columns:1fr 1.3fr;gap:2.5rem;align-items:center}
.intel-teaser .left{display:flex;flex-direction:column;gap:1.2rem}
.intel-teaser .right{display:flex;flex-direction:column;gap:1.4rem}
.intel-teaser h2{font-family:var(--serif);font-size:clamp(1.8rem,3.2vw,2.6rem);font-weight:400;letter-spacing:-.015em;line-height:1.05}
.intel-teaser h2 em{color:var(--gold);font-style:italic}
.intel-teaser .lead{color:var(--cream-dim);max-width:42ch;font-size:1rem}
.intel-mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.intel-mini{background:var(--navy-3);border:1px solid var(--line);border-radius:5px;padding:1.1rem 1.1rem .9rem;display:flex;flex-direction:column;gap:.4rem;min-height:108px}
.intel-mini .label{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--cream-faint)}
.intel-mini .value{font-family:var(--serif);font-size:1.7rem;font-weight:400;font-style:italic;color:var(--cream);line-height:1;letter-spacing:-.01em}
.intel-mini .meta{font-size:.78rem;color:var(--cream-dim);margin-top:auto}
.sparkline{background:var(--navy-3);border:1px solid var(--line);border-radius:5px;padding:1rem 1.2rem;height:110px;display:flex;flex-direction:column;gap:.4rem}
.sparkline .header{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint)}
.sparkline svg{flex:1;width:100%;display:block}
@media (max-width:880px){.intel-teaser{grid-template-columns:1fr;gap:1.8rem;padding:2rem 1.6rem}}
@media (max-width:560px){.intel-mini-grid{grid-template-columns:1fr;gap:.7rem}}

.btn{display:inline-flex;align-items:center;gap:.55rem;padding:.85rem 1.4rem;border:1px solid var(--line-strong);border-radius:4px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream);background:transparent;cursor:pointer;text-decoration:none;transition:all .15s ease;border-bottom:1px solid var(--line-strong);align-self:flex-start}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn.primary{background:var(--gold);color:var(--navy);border-color:var(--gold)}
.btn.primary:hover{background:transparent;color:var(--gold)}
.btn .arrow{transition:transform .15s ease}
.btn:hover .arrow{transform:translateX(3px)}

.crumbs{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint);margin:2.5rem 0 1.4rem}
.crumbs a{color:var(--cream-faint);border-bottom:none}
.crumbs a:hover{color:var(--cream)}
.crumbs .sep{margin:0 .55rem;opacity:.5}

.building-hero{display:grid;grid-template-columns:1fr 1.15fr;gap:1.8rem;align-items:stretch;margin:.5rem 0 2.5rem}
.building-hero .info{display:flex;flex-direction:column;gap:1rem;justify-content:center}
.building-hero h1{font-family:var(--serif);font-size:clamp(2rem,4.4vw,3.4rem);font-weight:400;line-height:1.05;letter-spacing:-.015em}
.building-hero .info .meta{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint);display:flex;gap:1rem;flex-wrap:wrap}
.building-hero .satellite{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;min-height:420px;overflow:hidden;position:relative}
.building-hero .satellite .leaflet-container{height:100%;width:100%;background:var(--navy-2);font-family:var(--sans)}
.building-hero .satellite .leaflet-control-attribution{background:rgba(15,19,29,0.7);color:rgba(232,227,216,0.5);font-size:9px}
.building-hero .satellite .leaflet-control-attribution a{color:var(--cream-faint)}
.map-fallback{display:flex;align-items:center;justify-content:center;height:100%;color:var(--cream-faint);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
@media (max-width:780px){.building-hero{grid-template-columns:1fr}.building-hero .satellite{min-height:300px;order:-1}}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;margin-bottom:2.5rem}
.stats-row .stat{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;padding:1.15rem 1.3rem;display:flex;flex-direction:column;gap:.55rem;min-height:100px}
.stats-row .stat .label{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--cream-faint)}
.stats-row .stat .value{font-family:var(--serif);font-size:1.85rem;font-weight:400;color:var(--cream);line-height:1;font-style:italic;letter-spacing:-.01em}
.stats-row .stat .meta{font-size:.85rem;color:var(--cream-dim);margin-top:auto}

.panel{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;padding:1.6rem 1.7rem}
.panel + .panel{margin-top:1.4rem}
.panel h2{font-family:var(--serif);font-size:1.5rem;font-weight:400;letter-spacing:-.005em;margin-bottom:.3rem}
.panel .sub{color:var(--cream-dim);font-size:.92rem;margin-bottom:1.3rem}

.panel-split{display:grid;grid-template-columns:1fr 1fr;gap:1.4rem;margin-bottom:1.4rem}
@media (max-width:780px){.panel-split{grid-template-columns:1fr}}

.unit-mix-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:.7rem;margin-top:.4rem}
.unit-mix{background:var(--navy-3);border:1px solid var(--line);border-radius:5px;padding:.95rem .9rem;display:flex;flex-direction:column;gap:.35rem;min-height:96px}
.unit-mix .label{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint)}
.unit-mix .value{font-family:var(--serif);font-size:1.55rem;font-weight:400;font-style:italic;color:var(--cream);line-height:1;letter-spacing:-.01em}
.unit-mix .meta{font-size:.76rem;color:var(--cream-dim);margin-top:auto}

.owner-rows{display:flex;flex-direction:column;margin-top:.2rem}
.owner-row{display:grid;grid-template-columns:1fr 1fr auto;align-items:center;gap:1rem;padding:.95rem 0;border-bottom:1px solid var(--line)}
.owner-row:last-child{border-bottom:none}
.owner-row .ow-label{font-size:.95rem;color:var(--cream)}
.owner-row .ow-bar{height:5px;background:var(--navy-3);border-radius:3px;overflow:hidden;max-width:180px;width:100%}
.owner-row .ow-bar > span{display:block;height:100%;background:var(--gold);transition:width .3s ease}
.owner-row .ow-pct{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--cream);min-width:54px;text-align:right;font-variant-numeric:tabular-nums}
.owner-row .ow-detail{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-faint);grid-column:1/-1;margin-top:-.45rem;padding-bottom:.3rem}

table.sales{width:100%;border-collapse:collapse;font-size:.9rem}
table.sales th{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cream-faint);text-align:left;padding:.55rem .7rem;border-bottom:1px solid var(--line-strong);font-weight:500}
table.sales td{padding:.7rem;border-bottom:1px solid var(--line);color:var(--cream)}
table.sales tr:last-child td{border-bottom:none}
table.sales td.num{text-align:right;font-variant-numeric:tabular-nums}
table.sales td.muted{color:var(--cream-dim)}
table.sales tbody tr:hover{background:rgba(255,255,255,0.015)}
@media (max-width:680px){table.sales th.hide-sm,table.sales td.hide-sm{display:none}}

.cta-row{display:flex;flex-wrap:wrap;gap:.8rem;margin-top:.8rem}

.intel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin-bottom:2rem}
.chart-wrap{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;padding:1.6rem 1.7rem;margin-bottom:1.4rem}
.chart-wrap svg{width:100%;height:auto;display:block}
.chart-wrap .axis text{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;fill:var(--cream-faint)}
.chart-wrap .grid line{stroke:var(--line);stroke-dasharray:2 4}
.chart-wrap .bar{fill:var(--gold);opacity:.85}
.chart-wrap .bar:hover{opacity:1}

.alert{padding:1rem 1.2rem;border-radius:6px;font-size:.95rem;background:rgba(201,138,138,0.07);border:1px solid rgba(201,138,138,0.25);color:var(--rose)}
.alert.empty{background:transparent;border-color:var(--line);color:var(--cream-dim);text-align:center;padding:2.5rem 1rem}

.loading{display:flex;align-items:center;justify-content:center;padding:6rem 1rem;color:var(--cream-faint);font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase}

.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
.card{background:var(--navy-2);border:1px solid var(--line);border-radius:6px;padding:1.4rem 1.5rem;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:.65rem;transition:border-color .15s ease,transform .15s ease;border-bottom:1px solid var(--line);min-height:160px}
.card:hover{border-color:var(--gold-dim);transform:translateY(-2px)}
.card h3{font-family:var(--serif);font-size:1.35rem;font-weight:400;letter-spacing:-.005em}
.card .meta{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--cream-faint);display:flex;gap:1rem;flex-wrap:wrap}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<script>
(function(){
'use strict';

const CFG = window.CONFIG;
const MARKET = window.MARKET;
const REST = CFG.SUPABASE_URL + '/rest/v1';
const HEADERS = {
  apikey: CFG.SUPABASE_ANON_KEY,
  Authorization: 'Bearer ' + CFG.SUPABASE_ANON_KEY,
  'Content-Type': 'application/json',
  Accept: 'application/json'
};

const fmt = {
  money(n){ if(n==null||isNaN(n)) return '—'; const v=Number(n); if(v>=1e9)return '$'+(v/1e9).toFixed(2)+'B'; if(v>=1e6)return '$'+(v/1e6).toFixed(2)+'M'; if(v>=1e3)return '$'+Math.round(v/1e3)+'K'; return '$'+Math.round(v).toLocaleString(); },
  moneyFull(n){ if(n==null||isNaN(n)) return '—'; return '$'+Math.round(Number(n)).toLocaleString(); },
  date(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d.getTime())) return '—'; return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); },
  ym(s){ if(!s) return '—'; const d=new Date(s); if(isNaN(d.getTime())) return '—'; return d.toLocaleDateString('en-US',{year:'numeric',month:'short'}); },
  num(n){ if(n==null||isNaN(n)) return '—'; return Number(n).toLocaleString(); },
  pct(num, den){ if(!den || den === 0) return '—'; return ((num/den)*100).toFixed(1).replace(/\.0$/,'') + '%'; }
};

const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

async function fetchRest(path){
  try {
    const r = await fetch(REST + path, { headers: HEADERS });
    if(!r.ok) return { data: null, error: 'HTTP ' + r.status };
    const json = await r.json();
    return { data: Array.isArray(json) ? json : (json==null?[]:[json]), error: null };
  } catch (e) {
    return { data: null, error: String(e && e.message || e) };
  }
}

function median(arr){
  if(!Array.isArray(arr) || arr.length===0) return null;
  const s = arr.filter(v => v!=null && !isNaN(v)).map(Number).sort((a,b)=>a-b);
  if(s.length===0) return null;
  const m = Math.floor(s.length/2);
  return s.length%2 ? s[m] : (s[m-1]+s[m])/2;
}

function applyHeader(){
  const brand = document.getElementById('brand');
  if(brand) brand.innerHTML = esc(MARKET.name) + ' <span class="accent">Condo Market</span>';
  const nav = document.getElementById('nav-primary');
  if(nav){
    const links = ['<a href="#/" data-route="/">Home</a>'];
    (MARKET.cities || []).forEach(c => links.push(`<a href="#/city/${esc(c.slug)}" data-route="/city/${esc(c.slug)}">${esc(c.name)}</a>`));
    links.push('<a href="#/intelligence" data-route="/intelligence">Intelligence</a>');
    nav.innerHTML = links.join('');
  }
  const fa = document.getElementById('footer-about');
  if(fa) fa.textContent = 'Every ' + MARKET.name + ' condo, indexed and analyzed. Built by an independent broker, for buyers and homeowners who want clarity.';
  const cl = document.getElementById('colophon');
  if(cl) cl.textContent = '© ' + new Date().getFullYear() + ' McMullen Properties LLC · ' + MARKET.domain;
  document.title = MARKET.name + ' Condo Market — every unit, every sale comp';
}

function updateNav(routePath){
  document.querySelectorAll('#nav-primary a').forEach(a => {
    const r = a.getAttribute('data-route') || '';
    a.classList.toggle('active', r === routePath || (r !== '/' && routePath.indexOf(r) === 0));
  });
}

function parseRoute(){
  let hash = window.location.hash || '';
  if(hash.indexOf('#') === 0) hash = hash.slice(1);
  const qIdx = hash.indexOf('?');
  if(qIdx >= 0) hash = hash.slice(0, qIdx);
  while(hash.length > 1 && hash.endsWith('/')) hash = hash.slice(0, -1);
  if(hash === '' || hash === '/') return { name: 'home', path: '/' };
  const parts = hash.split('/').filter(Boolean);
  if(parts[0] === 'city' && parts[1]) return { name: 'city', slug: parts[1], path: '/city/' + parts[1] };
  if(parts[0] === 'building' && parts[1]) return { name: 'building', slug: parts[1], path: '/building/' + parts[1] };
  if(parts[0] === 'intelligence') return { name: 'intelligence', path: '/intelligence' };
  return { name: 'notfound', path: hash };
}

const app = document.getElementById('app');
function render(html){ app.innerHTML = html; }
function loading(){ render('<div class="loading">Loading…</div>'); }
function errorBlock(msg){ return `<div class="container" style="padding-top:3rem"><div class="alert">Couldn't load this page: ${esc(msg)}. <a href="#/">Back to home</a>.</div></div>`; }

const _state = { homeBuildings: [], homeMap: null, homeMarkers: new Map(), homeMenuSort: { key: 'units', dir: 'desc' } };

async function loadHomeData(){
  const bldQ = '/v_buildings_with_market?market_slug=eq.' + encodeURIComponent(MARKET.slug)
             + '&is_catalogued=eq.true'
             + '&select=building_slug,display_name,unit_count,year_built,neighborhood,city_slug,city_display_name'
             + '&order=unit_count.desc.nullslast';
  const bldRes = await fetchRest(bldQ);
  if(bldRes.error) return { error: bldRes.error };
  const buildings = Array.isArray(bldRes.data) ? bldRes.data : [];
  if(buildings.length === 0) return { buildings: [], props: [], sales: [] };

  const slugs = buildings.map(b => b.building_slug).filter(Boolean);
  const slugList = slugs.map(s => '"' + s.replace(/"/g,'') + '"').join(',');
  const propQ = '/properties?building_slug=in.(' + slugList + ')&select=building_slug,lat,lng&limit=20000';
  const saleQ = '/building_sales?building_slug=in.(' + slugList + ')&select=building_slug,sale_date,sale_price&limit=20000';

  const [propRes, saleRes] = await Promise.all([fetchRest(propQ), fetchRest(saleQ)]);
  const props = Array.isArray(propRes.data) ? propRes.data : [];
  const sales = Array.isArray(saleRes.data) ? saleRes.data.filter(s => s.sale_price != null && Number(s.sale_price) > 0) : [];

  const propsBySlug = new Map();
  props.forEach(p => {
    if(p.lat == null || p.lng == null) return;
    if(!propsBySlug.has(p.building_slug)) propsBySlug.set(p.building_slug, []);
    propsBySlug.get(p.building_slug).push([Number(p.lat), Number(p.lng)]);
  });
  const salesBySlug = new Map();
  sales.forEach(s => {
    if(!salesBySlug.has(s.building_slug)) salesBySlug.set(s.building_slug, []);
    salesBySlug.get(s.building_slug).push(s);
  });

  const enriched = buildings.map(b => {
    const coords = propsBySlug.get(b.building_slug) || [];
    const centroid = coords.length > 0
      ? [coords.reduce((a,c)=>a+c[0],0)/coords.length, coords.reduce((a,c)=>a+c[1],0)/coords.length]
      : null;
    const bsales = salesBySlug.get(b.building_slug) || [];
    const sorted = bsales.slice().sort((a,b) => new Date(b.sale_date||0) - new Date(a.sale_date||0));
    return {
      slug: b.building_slug,
      name: b.display_name || b.building_slug,
      units: Number(b.unit_count || 0),
      year_built: b.year_built || null,
      neighborhood: b.neighborhood || '',
      city_slug: b.city_slug || '',
      city_name: b.city_display_name || '',
      coords: coords,
      centroid: centroid,
      sales_count: bsales.length,
      median: median(bsales.map(s => Number(s.sale_price))),
      last_sale: sorted.length > 0 ? sorted[0] : null
    };
  });
  return { buildings: enriched, props, sales };
}

async function renderHome(){
  loading();
  updateNav('/');

  const data = await loadHomeData();
  if(data.error){ render(errorBlock(data.error)); return; }
  const buildings = data.buildings || [];
  const sales = data.sales || [];

  _state.homeBuildings = buildings;
  const totalBuildings = buildings.length;
  const totalUnits = buildings.reduce((s, b) => s + b.units, 0);
  const totalSales = sales.length;
  const cutoff24 = new Date(); cutoff24.setMonth(cutoff24.getMonth() - 24);
  const recent24 = sales.filter(s => s.sale_date && new Date(s.sale_date) >= cutoff24);
  const recent24Count = recent24.length;
  const medianRecent = median(recent24.map(s => Number(s.sale_price)));
  const hottest = buildings.slice().sort((a,b) => {
    const aLast = a.last_sale ? new Date(a.last_sale.sale_date||0).getTime() : 0;
    const bLast = b.last_sale ? new Date(b.last_sale.sale_date||0).getTime() : 0;
    return bLast - aLast;
  })[0] || null;

  const byYear = new Map();
  sales.forEach(s => {
    if(!s.sale_date) return;
    const y = new Date(s.sale_date).getFullYear();
    if(isNaN(y) || y < 2010) return;
    byYear.set(y, (byYear.get(y) || 0) + 1);
  });
  const yearKeys = [...byYear.keys()].sort((a,b)=>a-b);
  const yearData = yearKeys.map(y => ({ year: y, count: byYear.get(y) }));

  const heroBg = MARKET.heroImage
    ? `<div class="bgimg" style="background-image:url('${esc(MARKET.heroImage)}')" role="img" aria-label="${esc(MARKET.name)} aerial"></div><div class="overlay"></div>`
    : '';
  const heroClass = MARKET.heroImage ? 'hero' : 'hero no-image';

  render(`
    <section class="${heroClass}">
      ${heroBg}
      <div class="content">
        <div class="inner">
          <p class="eyebrow">· ${esc(MARKET.heroEyebrow || 'Live')} ·</p>
          <h1>Every ${esc(MARKET.name)} condo, <em>indexed and analyzed.</em></h1>
          <p class="sub">Built by an independent broker, for buyers and homeowners who want clarity. No MLS gatekeeping, no algorithmic black boxes — just every condo in every building, every sale, every comp.</p>
        </div>
      </div>
    </section>

    <section class="stat-strip">
      <div class="container">
        <div class="grid">
          <div class="stat"><span class="label">Live buildings</span><span class="value">${fmt.num(totalBuildings)}</span><span class="meta">across ${(MARKET.cities||[]).filter(c => buildings.some(b => b.city_slug === c.slug)).length || 1} ${(buildings.length > 0 ? 'city' : 'cities')}</span></div>
          <div class="stat"><span class="label">Units tracked</span><span class="value">${fmt.num(totalUnits)}</span><span class="meta">individual condos</span></div>
          <div class="stat"><span class="label">Sales recorded</span><span class="value">${fmt.num(totalSales)}</span><span class="meta">historical comps</span></div>
          <div class="stat"><span class="label">Last 24 months</span><span class="value">${fmt.num(recent24Count)}</span><span class="meta">recent transactions</span></div>
        </div>
      </div>
    </section>

    <section class="page">
      <div class="container">
        <div class="section-head">
          <div>
            <h2>Find a <em>building</em>.</h2>
            <p class="lead">Type a name, neighborhood, or city to filter the map. Click any pin for full sale history.</p>
          </div>
          <div class="search-bar" id="map-search-bar">
            <span class="icon">⌕</span>
            <input id="map-search" type="search" placeholder="Search by name, neighborhood…" autocomplete="off">
            <button class="clear" id="map-search-clear" type="button" aria-label="Clear">×</button>
            <span class="result-count" id="map-count">${fmt.num(buildings.length)} buildings</span>
          </div>
        </div>
        <div class="map-wrap" id="home-map-wrap"></div>
      </div>
    </section>

    <section class="page">
      <div class="container">
        <div class="section-head">
          <div>
            <h2>All <em>buildings</em>.</h2>
            <p class="lead">Sortable index. Click any row to open full detail — sale history, owners, claim-my-unit.</p>
          </div>
          <div class="search-bar" id="menu-search-bar">
            <span class="icon">⌕</span>
            <input id="menu-search" type="search" placeholder="Filter list…" autocomplete="off">
            <button class="clear" id="menu-search-clear" type="button" aria-label="Clear">×</button>
            <span class="result-count" id="menu-count">${fmt.num(buildings.length)} rows</span>
          </div>
        </div>
        <table class="menu" id="building-menu">
          <thead>
            <tr>
              <th class="sortable" data-sort="name">Building</th>
              <th class="sortable hide-sm" data-sort="city">City</th>
              <th class="sortable num" data-sort="units">Units</th>
              <th class="sortable num hide-md" data-sort="year">Year</th>
              <th class="sortable num hide-sm" data-sort="sales">Sales</th>
              <th class="sortable num" data-sort="median">Median</th>
              <th class="sortable hide-md" data-sort="last">Last sale</th>
            </tr>
          </thead>
          <tbody id="menu-body"></tbody>
        </table>
      </div>
    </section>

    <section class="page">
      <div class="container">
        <div class="intel-teaser">
          <div class="left">
            <p class="eyebrow">Market</p>
            <h2>The <em>intelligence</em> behind every comp.</h2>
            <p class="lead">Every recorded sale, every building. Median prices from county recorder data — not algorithmic estimates, not MLS averages weighted by what's listed.</p>
            <a href="#/intelligence" class="btn primary">Full intelligence report <span class="arrow">→</span></a>
          </div>
          <div class="right">
            <div class="intel-mini-grid">
              <div class="intel-mini">
                <span class="label">Median (24mo)</span>
                <span class="value">${medianRecent ? fmt.money(medianRecent) : '—'}</span>
                <span class="meta">across ${fmt.num(recent24Count)} sales</span>
              </div>
              <div class="intel-mini">
                <span class="label">Sales (24mo)</span>
                <span class="value">${fmt.num(recent24Count)}</span>
                <span class="meta">recorded transactions</span>
              </div>
              <div class="intel-mini">
                <span class="label">Hottest building</span>
                <span class="value" style="font-size:1.1rem;font-style:normal;font-family:var(--serif);line-height:1.15">${hottest ? esc(hottest.name) : '—'}</span>
                <span class="meta">${hottest && hottest.last_sale ? 'last sale ' + fmt.ym(hottest.last_sale.sale_date) : ''}</span>
              </div>
            </div>
            <div class="sparkline">
              <div class="header"><span>Sales · year</span><span>${yearData.length > 0 ? yearData[0].year + '–' + yearData[yearData.length-1].year : '—'}</span></div>
              ${renderSparkline(yearData)}
            </div>
          </div>
        </div>
      </div>
    </section>
  `);

  setTimeout(() => initHomeMap(buildings), 30);
  setTimeout(() => renderBuildingMenu(), 0);
  wireMapSearch();
  wireMenuSearch();
  wireMenuSort();
}

function renderSparkline(data){
  if(!Array.isArray(data) || data.length === 0){
    return '<svg viewBox="0 0 400 60" preserveAspectRatio="none"></svg>';
  }
  const W = 400, H = 60, pad = 4;
  const max = Math.max(...data.map(d => d.count), 1);
  const step = (W - pad*2) / Math.max(data.length - 1, 1);
  const points = data.map((d, i) => {
    const x = pad + step * i;
    const y = H - pad - ((H - pad*2) * d.count / max);
    return [x, y];
  });
  const path = points.map((p,i) => (i===0?'M':'L') + p[0].toFixed(1) + ' ' + p[1].toFixed(1)).join(' ');
  const fillPath = path + ` L ${(W-pad).toFixed(1)} ${H-pad} L ${pad} ${H-pad} Z`;
  const dots = points.map((p,i) => i === points.length-1 ? `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.5" fill="#d4a574"/>` : '').join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-label="Sales by year sparkline"><path d="${fillPath}" fill="rgba(212,165,116,0.12)"/><path d="${path}" fill="none" stroke="#d4a574" stroke-width="1.5"/>${dots}</svg>`;
}

function initHomeMap(buildings){
  const el = document.getElementById('home-map-wrap');
  if(!el || typeof L === 'undefined') return;
  el.innerHTML = '';
  const map = L.map(el, { zoomControl: true, scrollWheelZoom: false, attributionControl: true }).setView(MARKET.centroid, MARKET.zoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);
  _state.homeMap = map;
  _state.homeMarkers = new Map();

  const valid = buildings.filter(b => b.centroid);
  if(valid.length === 0) return;

  valid.forEach(b => {
    const icon = L.divIcon({
      className: 'cm-pin',
      html: `<div style="width:14px;height:14px;border-radius:50%;background:#d4a574;border:2px solid #0f131d;box-shadow:0 0 0 1.5px #d4a574;transition:opacity .15s ease"></div>`,
      iconSize: [14, 14],
      iconAnchor: [7, 7]
    });
    const m = L.marker(b.centroid, { icon, riseOnHover: true });
    const popHtml = `<div class="map-pop">
      <div class="name">${esc(b.name)}</div>
      <div class="meta">${b.units ? fmt.num(b.units) + ' units' : ''}${b.units && b.neighborhood ? ' · ' : ''}${esc(b.neighborhood || '')}</div>
      <a class="cta" href="#/building/${esc(b.slug)}">View building →</a>
    </div>`;
    m.bindPopup(popHtml, { closeButton: true, autoPan: true });
    m.addTo(map);
    _state.homeMarkers.set(b.slug, m);
  });

  const bounds = L.latLngBounds(valid.map(b => b.centroid));
  map.fitBounds(bounds, { padding: [50, 50], maxZoom: 15 });
}

function filterMap(query){
  const q = String(query || '').toLowerCase().trim();
  const map = _state.homeMap;
  if(!map) return;
  const matches = [];
  _state.homeBuildings.forEach(b => {
    const m = _state.homeMarkers.get(b.slug);
    if(!m) return;
    const haystack = (b.name + ' ' + b.neighborhood + ' ' + b.city_name).toLowerCase();
    const hit = q === '' || haystack.indexOf(q) >= 0;
    const el = m.getElement();
    if(el){
      const inner = el.querySelector('div');
      if(inner) inner.style.opacity = hit ? '1' : '0.15';
    }
    if(hit) matches.push(b);
  });
  const cnt = document.getElementById('map-count');
  if(cnt) cnt.textContent = fmt.num(matches.length) + ' ' + (matches.length === 1 ? 'building' : 'buildings');
  if(q && matches.length > 0 && matches.length <= 5){
    const valid = matches.filter(b => b.centroid);
    if(valid.length > 0){
      map.fitBounds(L.latLngBounds(valid.map(b => b.centroid)), { padding: [60, 60], maxZoom: 17, animate: true });
    }
  } else if(q === ''){
    const valid = _state.homeBuildings.filter(b => b.centroid);
    if(valid.length > 0) map.fitBounds(L.latLngBounds(valid.map(b => b.centroid)), { padding: [50, 50], maxZoom: 15, animate: true });
  }
}

function wireMapSearch(){
  const input = document.getElementById('map-search');
  const bar = document.getElementById('map-search-bar');
  const clr = document.getElementById('map-search-clear');
  if(!input || !bar || !clr) return;
  let t;
  input.addEventListener('input', () => {
    bar.classList.toggle('has-value', input.value.length > 0);
    clearTimeout(t);
    t = setTimeout(() => filterMap(input.value), 80);
  });
  clr.addEventListener('click', () => { input.value = ''; bar.classList.remove('has-value'); filterMap(''); input.focus(); });
}

function renderBuildingMenu(){
  const body = document.getElementById('menu-body');
  if(!body) return;
  const search = (document.getElementById('menu-search')?.value || '').toLowerCase().trim();
  const filtered = _state.homeBuildings.filter(b => {
    if(!search) return true;
    return (b.name + ' ' + b.neighborhood + ' ' + b.city_name).toLowerCase().indexOf(search) >= 0;
  });
  const sortKey = _state.homeMenuSort.key;
  const dir = _state.homeMenuSort.dir === 'asc' ? 1 : -1;
  const accessors = {
    name: b => (b.name || '').toLowerCase(),
    city: b => (b.city_name || '').toLowerCase(),
    units: b => b.units || 0,
    year: b => b.year_built || 0,
    sales: b => b.sales_count || 0,
    median: b => b.median || 0,
    last: b => b.last_sale ? new Date(b.last_sale.sale_date || 0).getTime() : 0
  };
  const acc = accessors[sortKey] || accessors.units;
  filtered.sort((a,b) => {
    const va = acc(a), vb = acc(b);
    if(va < vb) return -1 * dir;
    if(va > vb) return 1 * dir;
    return 0;
  });

  const cnt = document.getElementById('menu-count');
  if(cnt) cnt.textContent = fmt.num(filtered.length) + ' ' + (filtered.length === 1 ? 'row' : 'rows');

  document.querySelectorAll('#building-menu thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if(th.getAttribute('data-sort') === sortKey){
      th.classList.add(_state.homeMenuSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
  });

  if(filtered.length === 0){
    body.innerHTML = '<tr class="empty-row"><td colspan="7">No buildings match.</td></tr>';
    return;
  }

  body.innerHTML = filtered.map(b => `<tr data-slug="${esc(b.slug)}">
    <td class="name">${esc(b.name)}</td>
    <td class="muted hide-sm">${esc(b.city_name)}</td>
    <td class="num">${fmt.num(b.units)}</td>
    <td class="num muted hide-md">${b.year_built || '—'}</td>
    <td class="num muted hide-sm">${fmt.num(b.sales_count)}</td>
    <td class="num">${b.median ? fmt.money(b.median) : '—'}</td>
    <td class="muted hide-md">${b.last_sale ? fmt.ym(b.last_sale.sale_date) : '—'}</td>
  </tr>`).join('');

  body.querySelectorAll('tr[data-slug]').forEach(tr => {
    tr.addEventListener('click', () => {
      const slug = tr.getAttribute('data-slug');
      if(slug) window.location.hash = '#/building/' + slug;
    });
  });
}

function wireMenuSearch(){
  const input = document.getElementById('menu-search');
  const bar = document.getElementById('menu-search-bar');
  const clr = document.getElementById('menu-search-clear');
  if(!input || !bar || !clr) return;
  let t;
  input.addEventListener('input', () => {
    bar.classList.toggle('has-value', input.value.length > 0);
    clearTimeout(t);
    t = setTimeout(renderBuildingMenu, 80);
  });
  clr.addEventListener('click', () => { input.value = ''; bar.classList.remove('has-value'); renderBuildingMenu(); input.focus(); });
}

function wireMenuSort(){
  document.querySelectorAll('#building-menu thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const k = th.getAttribute('data-sort');
      if(_state.homeMenuSort.key === k){
        _state.homeMenuSort.dir = _state.homeMenuSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        _state.homeMenuSort.key = k;
        _state.homeMenuSort.dir = (k === 'name' || k === 'city') ? 'asc' : 'desc';
      }
      renderBuildingMenu();
    });
  });
}

function initBuildingMap(coords, label){
  const el = document.getElementById('building-map');
  if(!el || typeof L === 'undefined'){ if(el) el.innerHTML = '<div class="map-fallback">Map library unavailable</div>'; return; }
  let center, zoom;
  if(Array.isArray(coords) && coords.length > 0){
    const lats = coords.map(c => c[0]);
    const lngs = coords.map(c => c[1]);
    center = [(Math.min(...lats) + Math.max(...lats)) / 2, (Math.min(...lngs) + Math.max(...lngs)) / 2];
    zoom = 18;
  } else { center = MARKET.centroid; zoom = MARKET.zoom; }
  el.innerHTML = '';
  try {
    const map = L.map(el, { zoomControl: true, scrollWheelZoom: false }).setView(center, zoom);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics, and the GIS User Community',
      maxZoom: 19
    }).addTo(map);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
      attribution: '',
      subdomains: 'abcd',
      maxZoom: 19,
      opacity: 0.85
    }).addTo(map);
    const icon = L.divIcon({ className: '', html: '<div style="width:14px;height:14px;border-radius:50%;background:#d4a574;border:2px solid #0f131d;box-shadow:0 0 0 1.5px #d4a574"></div>', iconSize: [14,14], iconAnchor: [7,7] });
    if(Array.isArray(coords) && coords.length > 0){
      coords.forEach(c => L.marker(c, { icon }).addTo(map));
      if(coords.length > 1) map.fitBounds(L.latLngBounds(coords), { padding: [40,40], maxZoom: 19 });
    } else { L.marker(center, { icon }).bindTooltip(label || 'Building').addTo(map); }
  } catch (e) { el.innerHTML = '<div class="map-fallback">Map could not load</div>'; }
}

  const allRow = s => `<tr><td><a href="#/building/${esc(s.slug)}" style="color:var(--cream);border-bottom:none">${esc(s.name)}</a></td><td class="hide-sm muted">${esc(s.city)}</td><td class="num muted">${fmt.num(s.units)}</td><td class="num">${fmt.num(s.total)}</td><td class="num">${s.median ? fmt.money(s.median) : '—'}</td><td class="num muted">${s.latest ? fmt.ym(s.latest.sale_date) : '—'}</td></tr>`;

  render(`<div class="container">
    <p class="crumbs"><a href="#/">Home</a><span class="sep">·</span>Market Intelligence</p>
    <section style="padding:1.5rem 0 2rem">
      <p class="eyebrow">${esc(MARKET.name)} · Aggregate Market</p>
      <h1 style="font-family:var(--serif);font-size:clamp(2.2rem,4.6vw,3.6rem);font-weight:400;line-height:1.05;margin:1rem 0 1.2rem;letter-spacing:-.015em">Market <em style="color:var(--gold);font-style:italic">intelligence.</em></h1>

    </section>
    <section style="padding-bottom:2rem">
      <div class="intel-grid">
        <div class="stats-row" style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1rem;margin:0">
          <div class="stat"><span class="label">Median (all-time)</span><span class="value">${medianAll ? fmt.money(medianAll) : '—'}</span><span class="meta">${fmt.num(totalSales)} comps</span></div>
          <div class="stat"><span class="label">Median (24 mo)</span><span class="value">${recentMedian ? fmt.money(recentMedian) : '—'}</span><span class="meta">${fmt.num(recent.length)} recent sales</span></div>
          <div class="stat"><span class="label">Volume tracked</span><span class="value">${fmt.money(totalVolume)}</span><span class="meta">total since 2010</span></div>
          <div class="stat"><span class="label">Buildings covered</span><span class="value">${fmt.num(buildings.length)}</span><span class="meta">100% catalogue coverage</span></div>
        </div>
      </div>
    </section>
    <section class="chart-wrap">
      <h2 style="font-family:var(--serif);font-size:1.5rem;font-weight:400;margin-bottom:.3rem">Sales by year</h2>
      <p style="color:var(--cream-dim);font-size:.92rem;margin-bottom:1.3rem">Recorded sales volume, 2010 → present. Bar height = number of recorded sales.</p>
      ${chartSvg}
    </section>
    <section class="panel">
      <h2>Hottest buildings (last 24 months)</h2>
      <p class="sub">Buildings with the most recorded sales activity in the trailing two years.</p>
      <table class="sales"><thead><tr><th>Building</th><th class="hide-sm">City</th><th style="text-align:right">Sales · 24mo</th><th class="hide-sm" style="text-align:right">All-time</th><th style="text-align:right">Median</th></tr></thead><tbody>${hottest.length > 0 ? hottest.map(rowFor).join('') : '<tr><td colspan="5" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table>
    </section>
    <section class="panel">
      <h2>Highest median sale price</h2>
      <p class="sub">Buildings ranked by median recorded sale price across full history.</p>
      <table class="sales"><thead><tr><th>Building</th><th class="hide-sm">City</th><th style="text-align:right">Median</th><th class="hide-sm" style="text-align:right">Sales</th><th style="text-align:right">Last sale</th></tr></thead><tbody>${priciest.length > 0 ? priciest.map(priceRow).join('') : '<tr><td colspan="5" class="muted" style="text-align:center">No data</td></tr>'}</tbody></table>
    </section>
    <section class="panel" style="margin-bottom:2rem">
      <h2>All buildings</h2>
      <p class="sub">Complete index. Click any building for full sale history and unit-level detail.</p>
      <table class="sales"><thead><tr><th>Building</th><th class="hide-sm">City</th><th class="hide-sm" style="text-align:right">Units</th><th style="text-align:right">Sales</th><th style="text-align:right">Median</th><th class="hide-sm" style="text-align:right">Last sale</th></tr></thead><tbody>${allRows.map(allRow).join('')}</tbody></table>
    </section>
  </div>`);
}

function renderYearChart(data, opts){
  opts = opts || {};
  const W = opts.W || 900, H = opts.H || 280;
  if(!Array.isArray(data) || data.length === 0){
    return '<p style="color:var(--cream-faint);font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;text-align:center;padding:2rem">No sales data</p>';
  }
  const pad = { t: 20, r: 30, b: 40, l: 50 };
  const innerW = W - pad.l - pad.r;
  const innerH = H - pad.t - pad.b;
  const maxCount = Math.max(...data.map(d => d.count), 1);
  const barW = innerW / data.length * 0.7;
  const step = innerW / data.length;
  const yTicks = 4;
  const yLines = [];
  for(let i = 0; i <= yTicks; i++){
    const y = pad.t + innerH - (innerH * i / yTicks);
    const v = Math.round(maxCount * i / yTicks);
    yLines.push(`<line x1="${pad.l}" y1="${y}" x2="${pad.l + innerW}" y2="${y}"></line><text x="${pad.l - 8}" y="${y + 3}" text-anchor="end">${v}</text>`);
  }
  const showEveryNth = data.length > 18 ? Math.ceil(data.length / 18) : 1;
  const bars = data.map((d, i) => {
    const x = pad.l + step * i + (step - barW) / 2;
    const h = innerH * (d.count / maxCount);
    const y = pad.t + innerH - h;
    const showLabel = (i % showEveryNth === 0) || i === data.length - 1;
    return `<rect class="bar" x="${x}" y="${y}" width="${barW}" height="${h}" rx="2"><title>${d.year}: ${d.count} sales · median ${d.median ? fmt.money(d.median) : '—'}</title></rect>${showLabel ? `<text x="${x + barW/2}" y="${pad.t + innerH + 18}" text-anchor="middle">${d.year}</text>` : ''}`;
  }).join('');
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Recorded condo sales by year"><g class="grid">${yLines.join('')}</g><g class="axis">${bars}</g></svg>`;
}

function renderNotFound(path){
  updateNav('');
  render(`<div class="container"><p class="crumbs"><a href="#/">← Back to home</a></p><section style="padding:2rem 0"><p class="eyebrow">404</p><h1 style="font-family:var(--serif);font-style:italic;font-weight:400;font-size:3rem">Not found</h1><p style="color:var(--cream-dim)">That page doesn't exist yet${path ? ` <span class="mono" style="color:var(--cream-faint)">(${esc(path)})</span>` : ''}. <a href="#/">Back to home</a>.</p></section></div>`);
}

async function route(){
  const r = parseRoute();
  try {
    if(r.name === 'home') return await renderHome();
    if(r.name === 'city') return await renderCity(r.slug);
    if(r.name === 'building') return await renderBuilding(r.slug);
    if(r.name === 'intelligence') return await renderIntelligence();
    return renderNotFound(r.path);
  } catch (e) {
    console.error('route error:', e);
    render(errorBlock((e && e.message) || 'unexpected error'));
  }
}

applyHeader();
window.addEventListener('hashchange', route);
window.addEventListener('DOMContentLoaded', route);
if(document.readyState !== 'loading') route();

})();
</script>
